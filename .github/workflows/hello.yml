name: abhay 05072026 code
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  abhayjob
    name: ubuntu
	runs-on: ubuntu-22.04
	steps:
	- name: checkout
	  uses: actions/checkout@v4.0.0
	- name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure CLI script
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show
